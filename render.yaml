services:
  - type: web
    name: easypass3d-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.js
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false          # à renseigner manuellement dans le dashboard Render
      - key: FRONTEND_URL
        value: https://easypass3d-seic.netlify.app
      - key: NODE_VERSION
        value: "18"
    healthCheckPath: /health
